<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <form>
        <div class="flex">
            <label>Inserisci i km che vuoi percorrere:</label>
            <input class="km-input" type="number" placeholder="Es. 45 km">
        </div>
        <div class="flex">
            <label>Inserisci la tua età:</label>
            <input class="age-input" type="number" placeholder="Es. 24">
        </div>
        <button type="submit">Calcola prezzo del biglietto</button>
    </form>

    <div class="ticket">
        <div class="single-box">
            <h4>Km che si vuole percorrere</h4>
            <div class="final-km"></div>
        </div>
        <div class="single-box">
            <h4>Età del passeggero</h4>
            <div class="final-age"></div>
        </div>
        <div class="single-box">
            <h4>Prezzo biglietto</h4>
            <div class="final-price"></div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
